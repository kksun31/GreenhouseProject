version: '3.8'

services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

  # Запускаем три одинаковых приложения, но с разными именами
  app1:
    build: .
    environment:
      - NODE_NAME=Нода 1
      - ConnectionStrings__DefaultConnection=Host=db;Username=${DB_USER};Password=${DB_PASSWORD};Database=${DB_NAME}
    depends_on:
      - db

  app2:
    build: .
    environment:
      - NODE_NAME=Нода 2
      - ConnectionStrings__DefaultConnection=Host=db;Username=${DB_USER};Password=${DB_PASSWORD};Database=${DB_NAME}
    depends_on:
      - db

  app3:
    build: .
    environment:
      - NODE_NAME=Нода 3
      - ConnectionStrings__DefaultConnection=Host=db;Username=${DB_USER};Password=${DB_PASSWORD};Database=${DB_NAME}
    depends_on:
      - db

  # Наш балансировщик Nginx
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80" # Теперь заходим просто по http://localhost
    depends_on:
      - app1
      - app2
      - app3